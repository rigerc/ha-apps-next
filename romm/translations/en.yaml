configuration:
  storage_path:
    name: Storage path
    description: Base path under /share used for RomM library, assets, resources, and config data.
  database_name:
    name: Database name
    description: MariaDB database name used by RomM. The app creates it automatically if needed.
  log_level:
    name: Log level
    description: Runtime logging level for RomM and its bundled services.
  kiosk_mode:
    name: Kiosk mode
    description: Start RomM in read-only mode for public or display-only access.
  enable_rescan_on_filesystem_change:
    name: Rescan on file changes
    description: Enable RomM's file watcher to trigger rescans when library files change.
  enable_scheduled_rescan:
    name: Scheduled rescan
    description: Enable scheduled library rescans.
  scheduled_rescan_cron:
    name: Scheduled rescan cron
    description: Cron expression used when scheduled rescans are enabled.
  disable_emulator_js:
    name: Disable EmulatorJS
    description: Disable in-browser gameplay through EmulatorJS.
  disable_ruffle_rs:
    name: Disable RuffleRS
    description: Disable Flash playback through RuffleRS.
  igdb_client_id:
    name: IGDB client ID
    description: Optional IGDB API client ID for RomM metadata enrichment.
  igdb_client_secret:
    name: IGDB client secret
    description: Optional IGDB API client secret.
  screenscraper_user:
    name: ScreenScraper user
    description: Optional ScreenScraper username.
  screenscraper_password:
    name: ScreenScraper password
    description: Optional ScreenScraper password.
  retroachievements_api_key:
    name: RetroAchievements API key
    description: Optional RetroAchievements API key.
  steamgriddb_api_key:
    name: SteamGridDB API key
    description: Optional SteamGridDB API key.
  mobygames_api_key:
    name: MobyGames API key
    description: Optional MobyGames API key.
